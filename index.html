<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>石戦 | SEKISEN</title>
    <meta
      name="description"
      content="石戦（SEKISEN）のブランドサイト。静かな高級感と整理されたEC骨格で、プレミアムトマトの価値を伝えます。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Old+Mincho:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <style>
      body[data-page="home"] .page-shell {
        overflow: visible;
      }

      body[data-page="home"] .site-main.site-main--sticky-preview {
        isolation: isolate;
      }

      body[data-page="home"] .site-main--sticky-preview .hero-stage {
        position: relative;
        z-index: 0;
        isolation: isolate;
      }

      body[data-page="home"] .site-main--sticky-preview .section {
        z-index: 2;
      }

      body[data-page="home"] .site-main--sticky-preview .hero {
        position: sticky;
        top: 0;
        z-index: 0;
        height: 100vh;
        min-height: 100vh;
        padding: clamp(124px, 18vh, 168px) 0 clamp(36px, 8vh, 78px);
      }

      body[data-page="home"] .site-main--sticky-preview .hero__layout {
        min-height: calc(100vh - clamp(124px, 18vh, 168px) - clamp(36px, 8vh, 78px));
      }

      body[data-page="home"] .site-main--sticky-preview .hero__scroll {
        justify-self: start;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage {
        margin-top: clamp(20px, 2.2vh, 28px);
        padding: clamp(34px, 5.6vh, 72px) 0 170px;
        background: #ffffff;
        border-radius: 40px 40px 0 0;
        box-shadow: 0 -28px 70px rgba(24, 20, 18, 0.08);
        overflow: visible;
        z-index: 3;
        scroll-margin-top: 120px;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage::before {
        display: none;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage__shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 34px;
        align-items: start;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage__copy {
        max-width: 640px;
        padding: 0;
        position: relative;
        z-index: 2;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage__copy .reveal-up {
        transition-duration: 1480ms;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage__copy .reveal-up--delay {
        transition-delay: 180ms;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage__copy .reveal-up--delay-2 {
        transition-delay: 320ms;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage__visual-shell {
        z-index: 1;
        max-width: min(1120px, 100%);
        margin: 6px 0 0;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage__visual-shell::before {
        inset: auto 24px -24px;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage__visual-panel {
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage__lead {
        margin-bottom: 16px;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-stage__gallery {
        grid-template-columns: 1fr;
        gap: 0;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-visual {
        background: linear-gradient(180deg, #f8f5f0 0%, #f1ece5 100%);
        border-radius: 28px;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-visual:not(:first-child) {
        display: none;
      }

      body[data-page="home"] .site-main--sticky-preview .intro-visual img {
        aspect-ratio: 16 / 9.2;
        box-shadow: 0 26px 58px rgba(24, 20, 18, 0.07);
      }

      body[data-page="home"] .site-header:not(.is-intro-visible) {
        opacity: 0 !important;
        visibility: hidden !important;
        pointer-events: none !important;
        transform: translateY(-18px) !important;
        transition: opacity 420ms ease, transform 420ms ease, visibility 0s linear 420ms !important;
      }

      body[data-page="home"] .site-header.is-intro-visible {
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important;
        transform: translateY(0) !important;
        transition: opacity 420ms ease, transform 420ms ease !important;
      }

      @media (max-width: 900px) {
        body[data-page="home"] .site-main--sticky-preview .hero {
          height: 100svh;
          min-height: 100svh;
          padding: 104px 0 30px;
        }

        body[data-page="home"] .site-main--sticky-preview .hero__layout {
          min-height: calc(100svh - 134px);
        }

        body[data-page="home"] .site-main--sticky-preview .intro-stage {
          margin-top: 18px;
          padding: 24px 0 86px;
          border-radius: 28px 28px 0 0;
          box-shadow: 0 -20px 42px rgba(24, 20, 18, 0.08);
        }

        body[data-page="home"] .site-main--sticky-preview .intro-stage__shell {
          gap: 20px;
        }

        body[data-page="home"] .site-main--sticky-preview .intro-stage__visual-shell::before {
          inset: auto 16px -16px;
          height: 34px;
          filter: blur(12px);
        }

        body[data-page="home"] .site-main--sticky-preview .intro-visual {
          border-radius: 20px;
        }

        body[data-page="home"] .site-main--sticky-preview .intro-visual img {
          aspect-ratio: 4 / 4.4;
        }
      }
    </style>
  </head>
  <body data-page="home">
    <noscript>
      <div class="no-script">
        JavaScriptを有効にすると、SEKISENのブランドサイトを表示できます。
      </div>
    </noscript>
    <div id="app"></div>
    <script src="./assets/js/content.js" defer></script>
    <script src="./assets/js/main.js" defer></script>
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        if (document.body.getAttribute("data-page") !== "home") {
          return;
        }

        var attempts = 0;
        var headerVisibilityBound = false;
        var headerTicking = false;

        function syncHeaderVisibility() {
          var header = document.querySelector(".site-header");
          var copy = document.querySelector(".intro-stage__copy");

          if (!header || !copy) {
            return;
          }

          var rect = copy.getBoundingClientRect();
          var shouldShow = rect.top < window.innerHeight - 24 && rect.bottom > 0;
          header.classList.toggle("is-intro-visible", shouldShow);
        }

        function queueHeaderVisibility() {
          if (headerTicking) {
            return;
          }

          headerTicking = true;
          window.requestAnimationFrame(function () {
            headerTicking = false;
            syncHeaderVisibility();
          });
        }

        function applyStickyHero() {
          var main = document.querySelector("#app .site-main");
          var hero = document.querySelector("#app .hero");
          var intro = document.querySelector("#app .intro-stage");

          if (!main || !hero || !intro) {
            attempts += 1;

            if (attempts < 12) {
              window.setTimeout(applyStickyHero, 120);
            }

            return;
          }

          main.classList.add("site-main--sticky-preview");

          if (!hero.parentElement || !hero.parentElement.classList.contains("hero-stage")) {
            var heroStage = document.createElement("section");
            heroStage.className = "hero-stage";

            hero.parentNode.insertBefore(heroStage, hero);
            heroStage.appendChild(hero);
            heroStage.appendChild(intro);
          }

          intro.id = "brand-intro";

          var scrollLink = hero.querySelector(".hero__scroll");
          if (scrollLink) {
            scrollLink.setAttribute("href", "#brand-intro");
          }

          var shell = intro.querySelector(".intro-stage__shell");
          var copy = intro.querySelector(".intro-stage__copy");
          var visual = intro.querySelector(".intro-stage__visual-shell");

          if (shell && copy && visual && shell.firstElementChild !== copy) {
            shell.insertBefore(copy, visual);
          }

          if (copy) {
            Array.prototype.forEach.call(
              copy.querySelectorAll(
                ".section-kicker, .section-title, .section-lead, .section-text"
              ),
              function (node, index) {
                node.classList.add("reveal-up");

                if (index === 1) {
                  node.classList.add("reveal-up--delay");
                }

                if (index >= 2) {
                  node.classList.add("reveal-up--delay-2");
                }
              }
            );
          }

          if (!headerVisibilityBound) {
            headerVisibilityBound = true;
            window.addEventListener("scroll", queueHeaderVisibility, { passive: true });
            window.addEventListener("resize", queueHeaderVisibility);
          }

          queueHeaderVisibility();
        }

        applyStickyHero();
      });
    </script>
  </body>
</html>
